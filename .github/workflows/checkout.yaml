name: test checkout

on:
  push:
    branches:
      - checkout

jobs:
  test-checkout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout quest repository
        uses: actions/checkout@v3
        with:
          repository: parseablehq/quest
          path: quest

      - name: Rename and Upload Result File
        run: |
          cd quest/clickbench
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          cp run_query.sh "result_$SHORT_SHA.csv"
          tree

      - uses: actions/upload-artifact@v3
        with:
          name: result_${{ env.SHORT_SHA }}
          path: result_${{ env.SHORT_SHA }}.csv
